<ion-card>
  <!-- IMAGE -->
  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/card-media.png" />
  <!-- HEADER -->
  <ion-card-header>
    <ion-card-title>{{ event.name }}</ion-card-title>
    <ion-card-subtitle>{{ event.daytime | date: 'dd MMMM yyyy - HH:mm' }}</ion-card-subtitle>
  </ion-card-header>
  <!-- CONTENT -->
  <ion-card-content>
    <h2>Description:</h2>
    {{ event.description }}
    <h2 class="mt-1">Participants:</h2>
    <ng-content *ngIf="event.participants.length === 0">No participants yet.</ng-content>
    <ng-content *ngFor="let participant of event.participants">
      {{ participant }}
    </ng-content>
    <h2 class="mt-1">Created by:</h2>
    {{ event.creator }}
  </ion-card-content>
</ion-card>
