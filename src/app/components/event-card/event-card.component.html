<ion-card>
  <!-- IMAGE -->
  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/card-media.png" />
  <!-- HEADER -->
  <ion-card-header>
    <ion-card-title>{{ data.name }}</ion-card-title>
    <ion-card-subtitle>{{ data.daytime | date: 'dd MMMM yyyy - HH:mm' }}</ion-card-subtitle>
  </ion-card-header>
  <!-- CONTENT -->
  <ion-card-content>
    {{ data.description }}
  </ion-card-content>
</ion-card>
