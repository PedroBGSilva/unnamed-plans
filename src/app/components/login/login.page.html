<ion-header *ngIf="resetting || signing">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="back()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="d-flex align-items-center justify-content-center h-100">
    <ng-content *ngIf="!resetting && !signing; else elseBlock">
      <form #loginForm="ngForm" class="w-75">
        <ion-item class="smooth-border-top">
          <ion-input type="email" label="{{ 'LOGIN.EMAIL' | translate }}" labelPlacement="stacked"
            placeholder="{{ 'LOGIN.EMAIL_PLACEHOLDER' | translate }}" [(ngModel)]="email" name="email"
            errorText="{{ 'LOGIN.INVALID_EMAIL' | translate }}" email autocomplete="email" required>
          </ion-input>
        </ion-item>
        <ion-item class="smooth-border-bottom">
          <ion-input type="password" label="{{ 'LOGIN.PASSWORD' | translate }}" labelPlacement="stacked"
            placeholder="{{ 'LOGIN.PASSWORD_PLACEHOLDER' | translate }}" [(ngModel)]="password" name="password"
            autocomplete="current-password" required>
            <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          </ion-input>
        </ion-item>
        <a (click)="toggleReset()" class="d-flex justify-content-end clickable pt-2">
          {{ 'LOGIN.PASSWORD_RESET' | translate }}
        </a>
        <div class="d-flex flex-column align-items-center">
          <ion-button type="submit" shape="round" [disabled]="loginForm.invalid" (click)="login()" class="pt-3 w-50">
            {{ 'LOGIN.LOGIN' | translate }}
          </ion-button>
          <p class="pt-2">{{ 'LOGIN.NO_ACCOUNT' | translate }}
            <a (click)="toggleSignUp()" class="clickable">{{ 'LOGIN.SIGN_UP' | translate }}</a>
          </p>
        </div>
      </form>
    </ng-content>
    <ng-template #elseBlock>
      <app-reset-password *ngIf="resetting" (resetPassword)="resetPassword($event)" class="w-75"></app-reset-password>
      <app-sign-up *ngIf="signing" (signup)="signup($event)" class="w-75"></app-sign-up>
    </ng-template>
  </div>
  <ion-toast [isOpen]="showToast" [message]="toastMessage" [duration]="2000" [buttons]="dismissButton"
    (didDismiss)="showToast = false"></ion-toast>
</ion-content>
