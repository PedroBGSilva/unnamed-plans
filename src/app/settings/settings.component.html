<div id="settings-tab" class="d-flex flex-column align-items-center h-100 ion-padding">
  <ion-button type="submit" shape="round" (click)="logout()" class="mt-auto w-50">
    {{ 'SETTINGS.LOGOUT' | translate }}
  </ion-button>
  <ion-toast [isOpen]="showToast" [message]="toastMessage" [duration]="2000"
    (didDismiss)="showToast = false"></ion-toast>
</div>
